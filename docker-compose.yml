version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: flyairways-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flyairways
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - flyairways-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flyairways-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - DB_DATABASE=flyairways
      - JWT_SECRET=supersecret123
      - PORT=3000
    depends_on:
      - postgres
    networks:
      - flyairways-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flyairways-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - flyairways-net

volumes:
  postgres-data:

networks:
  flyairways-net:
    driver: bridge
