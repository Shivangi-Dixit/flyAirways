<div class="group relative bg-[#0a0a0c]/80 backdrop-blur-md rounded-3xl border border-white/10 p-6 md:p-8 overflow-hidden hover:border-superapp-purple/60 transition-all duration-500 hover:shadow-neon-purple-lg hover:-translate-y-2">
  <div class="absolute top-0 right-0 w-48 h-48 bg-superapp-purple/5 rounded-full blur-[60px] group-hover:bg-superapp-purple/20 transition-all"></div>
  
  <div class="flex flex-col sm:flex-row justify-between items-start mb-10 relative z-10 gap-3">
    <div class="bg-black border border-superapp-purple/50 text-superapp-neonPurple px-4 py-1.5 rounded text-[10px] font-mono tracking-[0.2em] uppercase shadow-neon-purple flex items-center gap-2 max-w-full overflow-hidden whitespace-nowrap text-ellipsis">
      <span class="min-w-[8px] h-2 rounded-full bg-superapp-neonPurple animate-pulse"></span>
      {{ flight?.flightNumber }}
    </div>
    <div class="text-white/40 font-mono text-[10px] tracking-[0.2em] uppercase border border-white/10 px-3 py-1 rounded w-max">
      Direct // 7h 30m
    </div>
  </div>

  <div class="flex justify-between items-center relative z-10 mb-12 flex-wrap sm:flex-nowrap gap-4 sm:gap-0">
    <div class="text-left w-1/3 sm:w-[30%]">
      <div class="text-3xl sm:text-4xl lg:text-5xl font-black tracking-tighter mb-2 font-mono text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">{{flight?.departureTime | date:'HH:mm'}}</div>
      <div class="text-xs text-superapp-neonPurple font-bold tracking-[0.2em] uppercase truncate">{{flight?.origin}}</div>
    </div>
    
    <div class="w-1/3 sm:w-[40%] flex items-center justify-center px-4">
      <div class="w-full h-[1px] bg-gradient-to-r from-transparent via-superapp-purple to-transparent relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#0a0a0c] px-3 text-superapp-neonPurple">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 sm:w-6 sm:h-6 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
        </div>
      </div>
    </div>

    <div class="text-right w-1/3 sm:w-[30%]">
      <div class="text-3xl sm:text-4xl lg:text-5xl font-black tracking-tighter mb-2 font-mono text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">{{flight?.arrivalTime | date:'HH:mm'}}</div>
      <div class="text-xs text-superapp-neonPurple font-bold tracking-[0.2em] uppercase truncate">{{flight?.destination}}</div>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row justify-between items-end relative z-10 pt-6 border-t border-white/10 gap-6 sm:gap-0">
    <div class="w-full sm:w-auto">
      <div class="text-[10px] text-white/40 font-bold uppercase tracking-widest mb-1 truncate">Standard Class</div>
      <div class="text-3xl sm:text-4xl font-black text-white font-mono">\${{flight?.price}}</div>
    </div>
    <div class="flex flex-col items-end w-full sm:w-auto">
      <button (click)="onInitialize.emit(flight!)" class="btn-outline w-full sm:w-auto !py-2.5 !px-8 text-xs tracking-widest uppercase hover:text-white bg-black/50 hover:bg-superapp-purple backdrop-blur-sm">Initialize</button>
      @if (flight && flight.availableSeats < 10) {
        <div class="text-[9px] text-superapp-hotPurple mt-3 font-mono tracking-widest uppercase animate-pulse drop-shadow-[0_0_5px_rgba(147,51,234,0.8)] truncate max-w-full">Critical: {{flight.availableSeats}} units</div>
      }
    </div>
  </div>
</div>
